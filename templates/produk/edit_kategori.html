{% extends 'base.html' %}
{% load format_rupiah %}
{% block title %}Edit Kategori - Toko Salfa{% endblock %}
{% block page_title %}Edit Kategori{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Nama Kategori <span class="text-danger">*</span></label>
        <input type="text" name="nama" class="form-control" value="{{ kategori.nama }}" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Deskripsi</label>
        <textarea name="deskripsi" class="form-control" rows="2">{{ kategori.deskripsi }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Simpan
        </button>
        <a href="{% url 'produk:kategori' %}" class="btn btn-outline-secondary">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
