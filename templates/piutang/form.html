{% extends 'base.html' %}
{% load format_rupiah %}
{% block title %}Catat Piutang - Toko Salfa{% endblock %}
{% block page_title %}Catat Piutang Baru{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Pelanggan <span class="text-danger">*</span></label>
        <select name="pelanggan" class="form-select" required>
          <option value="">-- Pilih Pelanggan --</option>
          {% for p in pelanggan %}
          <option value="{{ p.id }}">{{ p.nama }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Nominal <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text">Rp</span>
          <input type="number" name="nominal" class="form-control" min="0" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Jatuh Tempo</label>
        <input type="date" name="jatuh_tempo" class="form-control">
      </div>
      <div class="mb-4">
        <label class="form-label">Catatan</label>
        <textarea name="catatan" class="form-control" rows="2" placeholder="Opsional..."></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Simpan
        </button>
        <a href="{% url 'piutang:list' %}" class="btn btn-outline-secondary">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
